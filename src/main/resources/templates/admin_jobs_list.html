<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Jobs Management - Admin</title>
    <style>
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; flex-direction: column; }
        .dashboard-container { display: flex; flex: 1; overflow: hidden; width: 100%; }
        .sidebar { width: 280px !important; background: linear-gradient(180deg, #667eea 0%, #764ba2 100%) !important; padding: 0 !important; display: flex !important; flex-direction: column !important; min-height: 100%; flex-shrink: 0; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .sidebar-header h2 { margin: 0; font-size: 22px; font-weight: 700; color: white; }
        .sidebar nav { display: flex; flex-direction: column; gap: 8px; padding: 20px 15px; flex: 1; }
        .sidebar .nav-item { color: rgba(255,255,255,0.9); padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 12px; transition: all 0.3s; }
        .sidebar .nav-item:hover { background-color: rgba(255,255,255,0.15); transform: translateX(4px); }
        .sidebar-footer { padding: 15px; border-top: 1px solid rgba(255,255,255,0.2); }
        .logout-btn { color: rgba(255,255,255,0.9); padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 12px; background: rgba(255,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); width: 100%; text-decoration: none; }
        main { flex: 1; padding: 40px; overflow-y: auto; background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%); }
        main h1 { color: #111827; margin-bottom: 35px; font-size: 32px; font-weight: 700; }
        .job-card { background: white; padding: 24px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.07); border-left: 4px solid #667eea; }
        .job-card h3 { margin: 0 0 12px 0; color: #111827; }
        .job-info { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 16px; color: #6b7280; font-size: 14px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div th:insert="~{fragments/sidebar_admin :: body}"></div>
    <main>
        <h1>💼 All Jobs</h1>
        <div th:each="job : ${jobs}" class="job-card">
            <h3 th:text="${job.title}">Job Title</h3>
            <div class="job-info">
                <div><strong>Department:</strong> <span th:text="${job.department}">Dept</span></div>
                <div><strong>Location:</strong> <span th:text="${job.location}">Location</span></div>
                <div><strong>Status:</strong> <span class="badge badge-success" th:text="${job.status}">Open</span></div>
                <div><strong>Posted:</strong> <span th:text="${#dates.format(job.createdDate, 'dd MMM yyyy')}">Date</span></div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
