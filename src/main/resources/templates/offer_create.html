<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Create Offer</title>
</head>
<body>
<div th:insert="fragments/header :: body"></div>
<main style="max-width: 700px; margin: 40px auto; padding: 0 20px;">
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);">
        <h1>Create Job Offer</h1>
        <p style="color: #666; margin-bottom: 30px;">Prepare and send an official job offer</p>
        
        <form th:action="@{/recruiter/offer/create}" method="post">
            <div class="form-group">
                <label for="applicationId">Application ID</label>
                <input id="applicationId" name="applicationId" th:value="${application.id}" readonly style="width: 100%; padding: 10px; background: #f5f5f5;" />
            </div>

            <div class="form-group">
                <label for="candidateName">Candidate</label>
                <input id="candidateName" th:value="${application.fullName}" readonly style="width: 100%; padding: 10px; background: #f5f5f5;" />
            </div>
            
            <div class="form-group">
                <label for="jobTitle">Position</label>
                <input id="jobTitle" th:value="${application.jobTitle}" readonly style="width: 100%; padding: 10px; background: #f5f5f5;" />
            </div>
            
            <div class="form-group">
                <label for="salary">Salary *</label>
                <input id="salary" name="salary" placeholder="e.g., $80,000 - $100,000" required style="width: 100%; padding: 10px; border: 2px solid #e1e1e1; border-radius: 6px;" />
            </div>
            
            <div class="form-group">
                <label for="benefits">Benefits</label>
                <textarea id="benefits" name="benefits" placeholder="List benefits (e.g., Health Insurance, 401k, PTO)" style="width: 100%; padding: 10px; border: 2px solid #e1e1e1; border-radius: 6px; font-family: inherit; font-size: 14; min-height: 100px;"></textarea>
            </div>
            
            <div class="form-group">
                <label for="expirationDate">Offer Expiration Date</label>
                <input id="expirationDate" name="expirationDate" type="date" style="width: 100%; padding: 10px; border: 2px solid #e1e1e1; border-radius: 6px;" />
            </div>

            <div class="form-group">
                <label for="offerPdf">Offer PDF (Optional)</label>
                <input id="offerPdf" name="offerPdf" type="file" accept=".pdf" style="width: 100%; padding: 10px; border: 2px solid #e1e1e1; border-radius: 6px;" />
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary" style="flex: 1; padding: 12px; border: none; border-radius: 6px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: 600; cursor: pointer;">💼 Create Offer</button>
                <a href="javascript:history.back()" class="btn btn-outline" style="flex: 1; text-align: center; padding: 12px; border: 2px solid #ddd; border-radius: 6px; text-decoration: none; font-weight: 600; color: #333;">Cancel</a>
            </div>
        </form>
    </div>
</main>
<div th:insert="fragments/footer :: body"></div>
</body>
</html>

    </div>
</main>
<div th:insert="fragments/footer :: body"></div>
</body>
</html>
