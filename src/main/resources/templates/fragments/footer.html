<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<footer th:fragment="footer" class="footer" style="width:100% !important; background:linear-gradient(135deg,#0f172a,#1e293b) !important; color:#e2e8f0 !important; padding:50px 0 25px 0 !important; border-top:3px solid #6366f1 !important; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif !important; position: relative !important; margin-top: auto !important;">

<div class="footer-container" style="max-width:1300px !important; margin:auto !important; padding:0 50px !important;">

<div class="footer-content" style="display:flex !important; justify-content:space-between !important; align-items:center !important; gap:80px !important; flex-wrap:wrap !important;">

<div class="footer-brand">
<h3 style="font-size:28px !important; color:#6366f1 !important; font-weight:700 !important; letter-spacing: -0.5px !important; text-shadow: 0 2px 4px rgba(0,0,0,0.3) !important; margin: 0 !important;">Recruiting System</h3>
</div>

<div class="footer-links" style="display:flex !important; gap:45px !important; flex-wrap:wrap !important; justify-content: center !important;">
<a href="/" style="text-decoration:none !important; color:#cbd5f5 !important; font-size:16px !important; font-weight: 500 !important; transition:all 0.3s ease !important; display:flex !important; align-items:center !important; gap:8px !important; padding: 8px 12px !important; border-radius: 6px !important;"><i class="fas fa-home" style="font-size: 14px !important; opacity: 0.8 !important; margin-right: 0 !important;"></i> Home</a>
<a href="/jobs" style="text-decoration:none !important; color:#cbd5f5 !important; font-size:16px !important; font-weight: 500 !important; transition:all 0.3s ease !important; display:flex !important; align-items:center !important; gap:8px !important; padding: 8px 12px !important; border-radius: 6px !important;"><i class="fas fa-briefcase" style="font-size: 14px !important; opacity: 0.8 !important; margin-right: 0 !important;"></i> Jobs</a>
<a href="/applicant/dashboard" style="text-decoration:none !important; color:#cbd5f5 !important; font-size:16px !important; font-weight: 500 !important; transition:all 0.3s ease !important; display:flex !important; align-items:center !important; gap:8px !important; padding: 8px 12px !important; border-radius: 6px !important;"><i class="fas fa-user" style="font-size: 14px !important; opacity: 0.8 !important; margin-right: 0 !important;"></i> Candidates</a>
<a href="/recruiter/dashboard" style="text-decoration:none !important; color:#cbd5f5 !important; font-size:16px !important; font-weight: 500 !important; transition:all 0.3s ease !important; display:flex !important; align-items:center !important; gap:8px !important; padding: 8px 12px !important; border-radius: 6px !important;"><i class="fas fa-users" style="font-size: 14px !important; opacity: 0.8 !important; margin-right: 0 !important;"></i> Recruiters</a>
<a href="/hr/dashboard" style="text-decoration:none !important; color:#cbd5f5 !important; font-size:16px !important; font-weight: 500 !important; transition:all 0.3s ease !important; display:flex !important; align-items:center !important; gap:8px !important; padding: 8px 12px !important; border-radius: 6px !important;"><i class="fas fa-user-tie" style="font-size: 14px !important; opacity: 0.8 !important; margin-right: 0 !important;"></i> HR Portal</a>
<a href="/admin/dashboard" style="text-decoration:none !important; color:#cbd5f5 !important; font-size:16px !important; font-weight: 500 !important; transition:all 0.3s ease !important; display:flex !important; align-items:center !important; gap:8px !important; padding: 8px 12px !important; border-radius: 6px !important;"><i class="fas fa-cog" style="font-size: 14px !important; opacity: 0.8 !important; margin-right: 0 !important;"></i> Admin</a>
</div>

<div class="footer-social" style="display:flex !important; gap:18px !important;">
<a href="#" title="LinkedIn" style="width:44px !important; height:44px !important; border-radius:10px !important; background:rgba(30, 41, 59, 0.8) !important; border: 1px solid rgba(99, 102, 241, 0.2) !important; display:flex !important; align-items:center !important; justify-content:center !important; color:#cbd5f5 !important; transition:all 0.3s ease !important; font-size: 18px !important; text-decoration: none !important;"><i class="fab fa-linkedin"></i></a>
<a href="#" title="Twitter" style="width:44px !important; height:44px !important; border-radius:10px !important; background:rgba(30, 41, 59, 0.8) !important; border: 1px solid rgba(99, 102, 241, 0.2) !important; display:flex !important; align-items:center !important; justify-content:center !important; color:#cbd5f5 !important; transition:all 0.3s ease !important; font-size: 18px !important; text-decoration: none !important;"><i class="fab fa-twitter"></i></a>
<a href="#" title="GitHub" style="width:44px !important; height:44px !important; border-radius:10px !important; background:rgba(30, 41, 59, 0.8) !important; border: 1px solid rgba(99, 102, 241, 0.2) !important; display:flex !important; align-items:center !important; justify-content:center !important; color:#cbd5f5 !important; transition:all 0.3s ease !important; font-size: 18px !important; text-decoration: none !important;"><i class="fab fa-github"></i></a>
</div>

</div>

<div class="footer-bottom" style="margin-top:35px !important; padding-top:20px !important; border-top:1px solid #334155 !important; display:flex !important; justify-content:space-between !important; align-items:center !important; flex-wrap:wrap !important;">

<p style="font-size:15px !important; color:#94a3b8 !important; font-weight: 400 !important; margin: 0 !important;">
&copy; <span th:text="${#calendars.format(#calendars.createNow(),'yyyy')}">2026</span>
Recruiting System. All rights reserved.
</p>

<div class="footer-bottom-links" style="display:flex !important; gap:25px !important;">
<a href="/privacy" style="text-decoration:none !important; color:#94a3b8 !important; font-size:15px !important; font-weight: 500 !important; transition:all 0.3s ease !important; padding: 4px 8px !important; border-radius: 4px !important;">Privacy Policy</a>
<a href="/terms" style="text-decoration:none !important; color:#94a3b8 !important; font-size:15px !important; font-weight: 500 !important; transition:all 0.3s ease !important; padding: 4px 8px !important; border-radius: 4px !important;">Terms of Service</a>
<a href="/help" style="text-decoration:none !important; color:#94a3b8 !important; font-size:15px !important; font-weight: 500 !important; transition:all 0.3s ease !important; padding: 4px 8px !important; border-radius: 4px !important;">Help Center</a>
</div>

</div>

</div>

</footer>

</body>
</html>
