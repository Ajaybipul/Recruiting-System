<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/modern-ui.css}" />
    <title>Edit Job Posting</title>
    <style>
        main h1 {
            color: #111827;
            margin-bottom: 35px;
            font-size: 32px;
            font-weight: 700;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
            max-width: 800px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .card form div {
            margin-bottom: 20px;
        }
        
        .card label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: #f8f9ff;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-grid > div {
            margin-bottom: 0;
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        
        .form-actions a, .form-actions button {
            flex: 1;
        }
    </style>
</head>
<body>

<div th:insert="~{fragments/header :: header}"></div>

<main style="padding: 40px; max-width: 900px; margin: 0 auto;">
    <h1>Edit Job Posting</h1>

        <div class="card">
            <form method="post" th:action="@{'/hr/jobs/' + ${job.id} + '/update'}">
                <div>
                    <label for="title">Job Title</label>
                    <input type="text" id="title" name="title" th:value="${job.title}" required />
                </div>

                <div>
                    <label for="description">Job Description</label>
                    <textarea id="description" name="description" required th:text="${job.description}"></textarea>
                </div>

                <div>
                    <label for="skills">Required Skills</label>
                    <textarea id="skills" name="skills" placeholder="Enter skills separated by commas"
                              th:text="${job.skills != null ? #strings.listJoin(job.skills, ', ') : ''}"></textarea>
                </div>

                <div class="form-grid">
                    <div>
                        <label for="department">Department</label>
                        <input type="text" id="department" name="department" th:value="${job.department}" required />
                    </div>
                    <div>
                        <label for="location">Job Location</label>
                        <input type="text" id="location" name="location" th:value="${job.location}" required />
                    </div>
                </div>

                <div class="form-grid">
                    <div>
                        <label for="salaryRange">Salary Range</label>
                        <input type="text" id="salaryRange" name="salaryRange" th:value="${job.salaryRange}" />
                    </div>
                    <div>
                        <label for="openings">Number of Openings</label>
                        <input type="number" id="openings" name="openings" th:value="${job.openings ?: 1}" min="1" required />
                    </div>
                </div>

                <div class="form-grid">
                    <div>
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="Open" th:selected="${job.status == 'Open'}">Open</option>
                            <option value="Closed" th:selected="${job.status == 'Closed'}">Closed</option>
                        </select>
                    </div>

                <div>
                    <label for="assignedRecruiter">Assign Recruiter</label>
                    <select id="assignedRecruiter" name="assignedRecruiter">
                        <option value="">-- Select a Recruiter --</option>
                        <option th:each="recruiter : ${recruiters}" 
                                th:value="${recruiter.username}" 
                                th:text="${recruiter.username}"
                                th:selected="${job.assignedRecruiter == recruiter.username}"></option>
                    </select>
                </div>

                <div>
                    <label for="assignedHiringManager">Assign Hiring Manager</label>
                    <select id="assignedHiringManager" name="assignedHiringManager">
                        <option value="">-- Select a Hiring Manager --</option>
                        <option th:each="hm : ${hiringManagers}" 
                                th:value="${hm.username}" 
                                th:text="${hm.username}"
                                th:selected="${job.assignedHiringManager == hm.username}"></option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a class="btn btn-outline" th:href="@{/hr/jobs}">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>

</body>
</html>
