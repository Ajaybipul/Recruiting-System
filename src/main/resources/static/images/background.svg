<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1724"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend mode="overlay"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" />
  <g opacity="0.06">
    <circle cx="200" cy="120" r="260" fill="#6c5ce7" />
    <circle cx="1400" cy="780" r="360" fill="#00b894" />
  </g>
  <rect width="100%" height="100%" fill="transparent" filter="url(#grain)" />
</svg>
