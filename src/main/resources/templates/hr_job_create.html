<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/modern-ui.css}" />
    <link rel="stylesheet" th:href="@{/css/hr-theme.css}" />
    <title>Create Job Posting</title>
    <style>
        /* FLEXBOX LAYOUT FOR HR PAGES */
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
        }
        
        .dashboard-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            width: 100%;
        }
        
        /* SIDEBAR STYLING */
        .sidebar {
            width: 280px !important;
            background: linear-gradient(180deg, #2d3748 0%, #1f2937 100%) !important;
            color: white !important;
            padding: 0 !important;
            min-height: 100% !important;
            overflow-y: auto !important;
            flex-shrink: 0 !important;
            border-right: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1) !important;
            display: flex !important;
            visibility: visible !important;
            position: relative !important;
            flex-direction: column !important;
        }
        
        .sidebar-header {
            padding: 25px 20px !important;
            border-bottom: 1px solid rgba(255,255,255,0.2) !important;
            text-align: center !important;
        }
        
        .sidebar-header h2 {
            margin: 0 !important;
            font-size: 22px !important;
            font-weight: 700 !important;
            color: white !important;
            letter-spacing: 0.5px !important;
        }
        
        .sidebar nav {
            display: flex !important;
            flex-direction: column !important;
            gap: 8px !important;
            padding: 20px 15px !important;
            flex: 1 !important;
        }
        
        .sidebar .nav-item {
            color: rgba(255, 255, 255, 0.9) !important;
            text-decoration: none !important;
            padding: 12px 16px !important;
            border-radius: 8px !important;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            font-size: 14px !important;
            font-weight: 500 !important;
        }
        
        .sidebar .nav-item .icon {
            font-size: 18px !important;
            display: inline-flex !important;
            align-items: center !important;
            min-width: 20px !important;
        }
        
        .sidebar .nav-item .label {
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }
        
        .sidebar .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.15) !important;
            transform: translateX(4px) !important;
            color: white !important;
        }
        
        .sidebar .nav-item.active {
            background: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        
        .sidebar .nav-item.create-job {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            margin-top: 10px !important;
        }
        
        .sidebar .nav-item.create-job:hover {
            background: rgba(255, 255, 255, 0.2) !important;
        }
        
        .sidebar .nav-divider {
            height: 1px !important;
            background: rgba(255, 255, 255, 0.15) !important;
            margin: 12px 0 !important;
        }
        
        .sidebar-footer {
            padding: 15px !important;
            border-top: 1px solid rgba(255,255,255,0.2) !important;
        }
        
        .sidebar-footer .logout-btn {
            color: rgba(255, 255, 255, 0.9) !important;
            text-decoration: none !important;
            padding: 12px 16px !important;
            border-radius: 8px !important;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            font-size: 14px !important;
            font-weight: 500 !important;
            background: rgba(255, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }
        
        .sidebar-footer .logout-btn:hover {
            background: rgba(255, 0, 0, 0.3) !important;
            transform: translateX(4px) !important;
            color: white !important;
        }
        
        .sidebar-footer .logout-btn .icon {
            font-size: 18px !important;
            display: inline-flex !important;
            align-items: center !important;
            min-width: 20px !important;
        }
        
        .sidebar-footer .logout-btn .label {
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }
        
        .sidebar hr {
            opacity: 0.2;
            margin: 20px 0;
            border: none;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        /* MAIN CONTENT AREA */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%);
        }
        
        main h1 {
            color: #111827;
            margin-bottom: 35px;
            font-size: 32px;
            font-weight: 700;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
            max-width: 800px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .card form div {
            margin-bottom: 20px;
        }
        
        .card label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: #f8f9ff;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-grid > div {
            margin-bottom: 0;
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        
        .form-actions a, .form-actions button {
            flex: 1;
        }
        
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                min-height: auto;
            }
            
            main {
                padding: 15px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-actions {
                flex-direction: column;
            }
            
            .form-actions a, .form-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body class="hr-theme">

<div th:insert="~{fragments/header :: header}"></div>
<div class="dashboard-container">
    <div th:replace="~{fragments/sidebar_hr :: body}"></div>

<main style="padding: 40px; max-width: 900px; margin: 0 auto;">
    <h1>Create Job Posting</h1>

    <div class="card">
        <form method="post" th:action="@{/hr/jobs/create}">
                <div>
                    <label for="title">Job Title</label>
                    <input type="text" id="title" name="title" required />
                </div>

                <div>
                    <label for="description">Job Description</label>
                    <textarea id="description" name="description" required></textarea>
                </div>

                <div>
                    <label for="skills">Required Skills</label>
                    <textarea id="skills" name="skills" placeholder="Enter skills separated by commas (e.g., Java, Spring Boot, PostgreSQL)" required></textarea>
                </div>

                <div class="form-grid">
                    <div>
                        <label for="department">Department</label>
                        <input type="text" id="department" name="department" required />
                    </div>
                    <div>
                        <label for="location">Job Location</label>
                        <input type="text" id="location" name="location" required />
                    </div>
                </div>

                <div class="form-grid">
                    <div>
                        <label for="salaryRange">Salary Range</label>
                        <input type="text" id="salaryRange" name="salaryRange" placeholder="e.g., $50,000 - $70,000" />
                    </div>
                    <div>
                        <label for="openings">Number of Openings</label>
                        <input type="number" id="openings" name="openings" value="1" min="1" required />
                    </div>
                </div>

                <div>
                    <label for="assignedRecruiter">Assign Recruiter</label>
                    <select id="assignedRecruiter" name="assignedRecruiter">
                        <option value="">-- Select a Recruiter --</option>
                        <option th:each="recruiter : ${recruiters}" th:value="${recruiter.username}" th:text="${recruiter.username}"></option>
                    </select>
                </div>

                <div>
                    <label for="assignedHiringManager">Assign Hiring Manager</label>
                    <select id="assignedHiringManager" name="assignedHiringManager">
                        <option value="">-- Select a Hiring Manager --</option>
                        <option th:each="hm : ${hiringManagers}" th:value="${hm.username}" th:text="${hm.username}"></option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create Job</button>
                    <a class="btn btn-outline" th:href="@{/hr/jobs}">Cancel</a>
                </div>
            </form>
        </div>
</main>

<div th:insert="~{fragments/footer :: footer}"></div>

</body>
</html>
