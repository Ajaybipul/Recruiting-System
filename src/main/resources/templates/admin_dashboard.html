<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/professional-theme.css}" />
    <link rel="stylesheet" th:href="@{/css/modern.css}" />
    <title>Admin Dashboard</title>
    <style>
        /* FLEXBOX LAYOUT FOR PAGES */
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
        }
        
        .dashboard-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            width: 100%;
        }
        
        /* SIDEBAR STYLING */
        .sidebar {
            width: 280px !important;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%) !important;
            color: white !important;
            padding: 0 !important;
            min-height: 100% !important;
            overflow-y: auto !important;
            flex-shrink: 0 !important;
            border-right: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1) !important;
            display: flex !important;
            visibility: visible !important;
            position: relative !important;
            flex-direction: column !important;
        }
        
        .sidebar-header {
            padding: 25px 20px !important;
            border-bottom: 1px solid rgba(255,255,255,0.2) !important;
            text-align: center !important;
        }
        
        .sidebar-header h2 {
            margin: 0 !important;
            font-size: 22px !important;
            font-weight: 700 !important;
            color: white !important;
            letter-spacing: 0.5px !important;
        }
        
        .sidebar nav {
            display: flex !important;
            flex-direction: column !important;
            gap: 8px !important;
            padding: 20px 15px !important;
            flex: 1 !important;
        }
        
        .sidebar .nav-item {
            color: rgba(255, 255, 255, 0.9) !important;
            text-decoration: none !important;
            padding: 12px 16px !important;
            border-radius: 8px !important;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            font-size: 14px !important;
            font-weight: 500 !important;
        }
        
        .sidebar .nav-item .icon {
            font-size: 18px !important;
            display: inline-flex !important;
            align-items: center !important;
            min-width: 20px !important;
        }
        
        .sidebar .nav-item .label {
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }
        
        .sidebar .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.15) !important;
            transform: translateX(4px) !important;
            color: white !important;
        }
        
        .sidebar .nav-item.active {
            background: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        
        .sidebar-footer {
            padding: 15px !important;
            border-top: 1px solid rgba(255,255,255,0.2) !important;
        }
        
        .sidebar-footer .logout-btn {
            color: rgba(255, 255, 255, 0.9) !important;
            text-decoration: none !important;
            padding: 12px 16px !important;
            border-radius: 8px !important;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            font-size: 14px !important;
            font-weight: 500 !important;
            background: rgba(255, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }
        
        .sidebar-footer .logout-btn:hover {
            background: rgba(255, 0, 0, 0.3) !important;
            transform: translateX(4px) !important;
            color: white !important;
        }
        
        .sidebar-footer .logout-btn .icon {
            font-size: 18px !important;
            display: inline-flex !important;
            align-items: center !important;
            min-width: 20px !important;
        }
        
        .sidebar-footer .logout-btn .label {
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }
        
        /* MAIN CONTENT AREA */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%);
        }
        
        main h1 {
            color: #111827;
            margin-bottom: 35px;
            font-size: 32px;
            font-weight: 700;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .stat-card h3 {
            color: #6b7280;
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 12px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-card.accent1 {
            border-left: 4px solid #667eea;
        }

        .stat-card.accent2 {
            border-left: 4px solid #f093fb;
        }

        .stat-card.accent3 {
            border-left: 4px solid #4facfe;
        }

        .stat-card.accent4 {
            border-left: 4px solid #43e97b;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <main>
        <h1>Admin Dashboard</h1>

        <div class="stats">
            <div class="stat-card accent1">
                <h3>Total Users</h3>
                <div class="number" th:text="${totalUsers}">0</div>
            </div>
            <div class="stat-card accent2">
                <h3>Total Jobs</h3>
                <div class="number" th:text="${totalJobs}">0</div>
            </div>
            <div class="stat-card accent3">
                <h3>Total Applications</h3>
                <div class="number" th:text="${totalApplications}">0</div>
            </div>
        </div>
    </main>
</div>

<!-- Include the footer fragment -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
