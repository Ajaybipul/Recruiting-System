<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding Checklists - Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .page-header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header p {
            color: #666;
            font-size: 1em;
        }

        .checklists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .checklist-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .checklist-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .checklist-card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .checklist-card-header h3 {
            font-size: 1.2em;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-not-started {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .status-in-progress {
            background: #ffc107;
            color: #333;
        }

        .status-completed {
            background: #28a745;
            color: white;
        }

        .checklist-card-body {
            padding: 20px;
        }

        .checklist-info {
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95em;
            color: #555;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .progress-container {
            margin-bottom: 15px;
        }

        .progress-bar-bg {
            background: #e9ecef;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.85em;
            color: #666;
            text-align: center;
            font-weight: 600;
        }

        .checklist-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .btn-view {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-view:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
        }

        .empty-state {
            background: white;
            padding: 60px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .empty-state i {
            font-size: 4em;
            color: #ccc;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #666;
            font-size: 1.05em;
        }

        .breadcrumb {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            color: white;
            font-size: 0.95em;
        }

        .breadcrumb a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div th:replace="fragments/header :: body"></div>

<div class="container">
    <div class="breadcrumb">
        <a href="/dashboard">Dashboard</a> / Onboarding Checklists
    </div>

    <div class="page-header">
        <h1>
            <i class="fas fa-clipboard-list"></i>
            Employee Onboarding Checklists
        </h1>
        <p>Manage and complete onboarding tasks for new employees</p>
    </div>

    <div th:if="${checklists != null and checklists.size() > 0}" class="checklists-grid">
        <div class="checklist-card" th:each="checklist : ${checklists}">
            <div class="checklist-card-header">
                <div>
                    <h3 th:text="${checklist.candidateName}"></h3>
                    <div style="font-size: 0.9em; opacity: 0.9;" th:text="${checklist.jobTitle}"></div>
                </div>
                <span class="status-badge" th:classappend="'status-' + ${checklist.overallStatus.toLowerCase().replace(' ', '-')}" 
                      th:text="${checklist.overallStatus}"></span>
            </div>

            <div class="checklist-card-body">
                <div class="checklist-info">
                    <div class="info-row">
                        <span class="info-label">Email:</span>
                        <span th:text="${checklist.candidateEmail}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Start Date:</span>
                        <span th:text="${#dates.format(checklist.startDate, 'MMM dd, yyyy')}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Template:</span>
                        <span th:text="${checklist.templateName}"></span>
                    </div>
                </div>

                <div class="progress-container">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" th:style="'width: ' + ${checklist.completionPercentage} + '%'"></div>
                    </div>
                    <div class="progress-text" th:text="${checklist.completionPercentage} + '% Complete'"></div>
                </div>

                <div class="checklist-actions">
                    <a th:href="@{/manager/onboarding/checklist/{id}(id=${checklist.id})}" class="btn btn-view">
                        <i class="fas fa-eye"></i> View Tasks
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${checklists == null or checklists.size() == 0}" class="empty-state">
        <i class="fas fa-check-circle"></i>
        <h2>No Active Checklists</h2>
        <p>All onboarding checklists have been completed or there are no checklists assigned yet.</p>
    </div>
</div>

<div th:replace="fragments/footer :: body"></div>
</body>
</html>
