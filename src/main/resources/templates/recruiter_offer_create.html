<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Create Offer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .candidate-info {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }
        .candidate-info p { margin: 5px 0; color: #555; }
        .candidate-info strong { color: #333; }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #eee;
            color: #333;
        }
        .btn-secondary:hover {
            background: #ddd;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📄 Create Job Offer</h1>
    <p class="subtitle">Send a formal job offer to the shortlisted candidate</p>

    <div class="candidate-info">
        <p><strong>Candidate:</strong> <span th:text="${candidateApplication.fullName}"></span></p>
        <p><strong>Email:</strong> <span th:text="${candidateApplication.email}"></span></p>
        <p><strong>Applied Position:</strong> <span th:text="${candidateApplication.jobTitle}"></span></p>
    </div>

    <form th:action="@{/recruiter/offer/create}" method="post">
        <input type="hidden" name="applicationId" th:value="${candidateApplication.id}" />

        <div class="form-group">
            <label for="position">Position Title *</label>
            <input type="text" id="position" name="position" th:value="${candidateApplication.jobTitle}" required />
        </div>

        <div class="form-group">
            <label for="department">Department *</label>
            <input type="text" id="department" name="department" placeholder="e.g., Engineering, Sales, HR" required />
        </div>

        <div class="form-group">
            <label for="salary">Salary (Annual) *</label>
            <input type="number" id="salary" name="salary" step="0.01" placeholder="50000.00" required />
        </div>

        <div class="form-group">
            <label for="notes">Additional Terms & Conditions</label>
            <textarea id="notes" name="notes" placeholder="Add any special terms, benefits, or conditions..."></textarea>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Create Offer</button>
            <a href="/recruiter/applicants" class="btn btn-secondary" style="text-align: center; line-height: 1;">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
