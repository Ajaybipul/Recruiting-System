<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/site.css}" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/professional-theme.css}" />
    <title>Job Applicants</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        main {
            flex: 1;
            padding: 40px;
            margin-left: 280px;
        }

        .page-header {
            background: rgba(102, 126, 234, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 40px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.1);
        }

        .page-header h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            font-size: 1.1em;
            color: #cbd5e1;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .applicant-row {
            padding: 24px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.2s ease;
        }

        .applicant-row:hover {
            background: rgba(102, 126, 234, 0.05);
            border-radius: 10px;
        }

        .applicant-row:last-child {
            border-bottom: none;
        }

        .applicant-info {
            flex: 1;
        }

        .applicant-name {
            font-size: 1.2em;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .applicant-meta {
            font-size: 0.95em;
            color: #64748b;
            margin: 4px 0;
        }

        .applicant-meta a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .applicant-meta a:hover {
            text-decoration: underline;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 700;
            color: white;
        }

        .badge-submitted {
            background: #6c757d;
        }

        .badge-shortlisted {
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.2) 0%, rgba(255, 140, 0, 0.1) 100%);
            color: #ea580c;
            border: 1px solid rgba(255, 140, 0, 0.3);
        }

        .badge-interview {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.1) 100%);
            color: #2563eb;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .badge-sent {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(16, 185, 129, 0.1) 100%);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-rejected {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.1) 100%);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .applicant-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-start;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state p {
            color: #666;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            .applicant-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .applicant-actions {
                width: 100%;
                margin-top: 12px;
            }
        }
    </style>
</head>

<body>
<div th:insert="~{fragments/header :: header}"></div>

<div class="dashboard-layout">
    <div th:insert="~{fragments/sidebar_recruiter :: body}"></div>

    <main>
        <div class="page-header">
            <h1>Job Applicants</h1>
            <p>Review and manage applicants for this position</p>
        </div>

        <div class="content-card">
            <div th:if="${#lists.isEmpty(applications)}" class="empty-state">
                <p>No applications yet for this job posting.</p>
            </div>

            <div th:if="${!#lists.isEmpty(applications)}">
                <div th:each="app : ${applications}" class="applicant-row" style="flex-direction: column; align-items: flex-start; gap: 16px; padding: 24px;">
                    <!-- Applicant Header -->
                    <div style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div class="applicant-name" th:text="${app.fullName}">Applicant Name</div>
                            <span th:switch="${app.status}">
                                <span th:case="'Submitted'" class="status-badge badge-submitted">Submitted</span>
                                <span th:case="'Shortlisted'" class="status-badge badge-shortlisted">Shortlisted</span>
                                <span th:case="'Interview Scheduled'" class="status-badge badge-interview">Interview</span>
                                <span th:case="'Sent to Hiring Manager'" class="status-badge badge-sent">Sent to HM</span>
                                <span th:case="'Rejected'" class="status-badge badge-rejected">Rejected</span>
                                <span th:case="*" class="status-badge badge-submitted" th:text="${app.status}">Status</span>
                            </span>
                        </div>
                    </div>

                    <!-- Applicant Details Grid -->
                    <div style="width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div>
                            <div style="font-weight: 600; color: #667eea; font-size: 0.9em; margin-bottom: 4px;">EMAIL</div>
                            <div style="color: #333;">
                                <a th:href="@{'mailto:' + ${app.email}}" th:text="${app.email}">email@example.com</a>
                            </div>
                        </div>
                        <div>
                            <div style="font-weight: 600; color: #667eea; font-size: 0.9em; margin-bottom: 4px;">PHONE</div>
                            <div style="color: #333;" th:text="${app.phone ?: 'Not provided'}">Phone</div>
                        </div>
                        <div>
                            <div style="font-weight: 600; color: #667eea; font-size: 0.9em; margin-bottom: 4px;">SKILLS</div>
                            <div style="color: #333;" th:text="${app.skills ?: 'Not provided'}">Skills</div>
                        </div>
                        <div>
                            <div style="font-weight: 600; color: #667eea; font-size: 0.9em; margin-bottom: 4px;">EXPERIENCE</div>
                            <div style="color: #333;" th:text="${app.experience ?: 'Not provided'}">Experience</div>
                        </div>
                    </div>

                    <!-- Resume Download -->
                    <div th:if="${app.resumePath}" style="width: 100%;">
                        <a th:href="${app.resumePath}" target="_blank" class="btn btn-primary" style="padding: 10px 16px; font-size: 0.85em;">📄 View Resume</a>
                    </div>

                    <!-- Screening Notes -->
                    <div style="width: 100%;">
                        <label style="font-weight: 600; color: #667eea; display: block; margin-bottom: 8px;">SCREENING NOTES FOR HIRING MANAGER</label>
                        <form th:action="@{'/recruiter/applicant/' + ${app.id}}" method="post">
                            <input type="hidden" name="jobId" th:value="${jobId}">
                            <textarea name="screeningNotes" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 0.95em; min-height: 80px;" th:text="${app.screeningNotes ?: ''}"></textarea>
                            <div class="applicant-actions" style="margin-top: 12px; justify-content: flex-start;">
                                <button class="btn btn-success" type="submit" name="action" value="shortlist">✓ Shortlist</button>
                                <button class="btn btn-outline" type="submit" name="action" value="reject">✗ Reject</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
