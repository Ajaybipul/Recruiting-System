<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/site.css}" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/professional-theme.css}" />
    <title>My Job Posts</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        main {
            flex: 1;
            padding: 40px;
            margin-left: 280px;
        }

        .page-header {
            background: rgba(102, 126, 234, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 40px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.1);
        }

        .page-header h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            font-size: 1.1em;
            color: #cbd5e1;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .table th {
            padding: 18px;
            text-align: left;
            font-weight: 700;
            color: #1e293b;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table td {
            padding: 18px;
            border-bottom: 1px solid #e9ecef;
            color: #555;
        }

        .table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 700;
        }

        .badge-active {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(16, 185, 129, 0.1) 100%);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-draft {
            background: rgba(156, 163, 175, 0.2);
            color: #4b5563;
            border: 1px solid rgba(156, 163, 175, 0.3);
        }

        .published-yes {
            color: #10b981;
            font-weight: 700;
        }

        .published-no {
            color: #9ca3af;
            font-weight: 700;
        }

        .action-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
<div th:insert="~{fragments/header :: header}"></div>

<div class="dashboard-layout">
    <div th:insert="~{fragments/sidebar_recruiter :: body}"></div>

    <main>
        <div class="page-header">
            <h1>My Job Posts</h1>
            <p>Manage all your job postings — track applicants and edit listings</p>
        </div>

        <div class="content-card">
            <div th:if="${#lists.isEmpty(positions)}" class="empty-state">
                <p>You haven't created any job posts yet.</p>
                <a class="btn btn-primary" th:href="@{/recruiter/create}">Create Job Posting</a>
            </div>

            <div th:if="${!#lists.isEmpty(positions)}">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Job Title</th>
                            <th>Location</th>
                            <th>Openings</th>
                            <th>Status</th>
                            <th>Published</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${positions}">
                            <td>
                                <strong th:text="${p.title}">Job Title</strong>
                            </td>
                            <td th:text="${p.location}">Location</td>
                            <td>
                                <strong th:text="${p.openings}">1</strong>
                            </td>
                            <td>
                                <span th:if="${p.status == 'Active'}" class="badge badge-active" th:text="${p.status}">Active</span>
                                <span th:if="${p.status != 'Active'}" class="badge badge-draft" th:text="${p.status}">Draft</span>
                            </td>
                            <td>
                                <span th:if="${p.published}" class="published-yes">✓ Published</span>
                                <span th:unless="${p.published}" class="published-no">Not Published</span>
                            </td>
                            <td>
                                <div class="action-group">
                                    <a th:if="${p.id != null && p.id != ''}" class="btn btn-primary" th:href="@{'/recruiter/job/' + ${p.id} + '/applicants'}">
                                        View Applicants
                                    </a>
                                    <span th:unless="${p.id != null && p.id != ''}" class="btn btn-primary" style="opacity: 0.5; cursor: not-allowed;">
                                        View Applicants
                                    </span>
                                    <a th:if="${p.id != null && p.id != ''}" class="btn btn-outline" th:href="@{'/jobs/edit/' + ${p.id}}">
                                        Edit
                                    </a>
                                    <span th:unless="${p.id != null && p.id != ''}" class="btn btn-outline" style="opacity: 0.5; cursor: not-allowed;">
                                        Edit
                                    </span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
