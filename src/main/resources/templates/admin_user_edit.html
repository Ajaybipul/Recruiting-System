<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Edit User - Admin</title>
    <style>
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
        }
        
        .dashboard-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            width: 100%;
        }
        
        .sidebar {
            width: 280px !important;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%) !important;
            color: white !important;
            padding: 0 !important;
            min-height: 100% !important;
            overflow-y: auto !important;
            flex-shrink: 0 !important;
            border-right: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1) !important;
            display: flex !important;
            visibility: visible !important;
            position: relative !important;
            flex-direction: column !important;
        }

        main {
            flex: 1;
            padding: 40px;
            background: #f5f5f5;
            overflow-y: auto;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-item label {
            margin: 0;
            font-weight: 500;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div th:insert="~{fragments/sidebar_admin :: body}"></div>

    <main>
        <h1>✏️ Edit User</h1>

        <div class="form-container">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form method="POST" th:action="@{/admin/users/{username}/update(username=${user.username})}">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:value="${user.username}" disabled />
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" th:value="${user.email}" />
                </div>

                <div class="form-group">
                    <label>Roles</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item" th:each="role : ${roles}">
                            <input type="checkbox" name="roles" th:value="${role}" 
                                   th:id="${'role-' + role}"
                                   th:checked="${user.roles.contains(role)}" />
                            <label th:for="${'role-' + role}" th:text="${role}"></label>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary">Save Changes</button>
                    <a href="/admin/users" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>

</body>
</html>
