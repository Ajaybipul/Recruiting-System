<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Access Denied</title>
</head>
<body>
<div th:insert="fragments/header :: body"></div>
<main style="display: flex; align-items: center; justify-content: center; min-height: 60vh; padding: 20px;">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08); text-align: center; max-width: 500px;">
        <div style="font-size: 48px; margin-bottom: 20px;">🔒</div>
        <h1 style="color: #dc3545; margin-bottom: 10px;">Access Denied</h1>
        <p style="color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 30px;">
            You do not have permission to access this page. If you believe this is an error, please contact your administrator.
        </p>
        <a th:href="@{/}" class="btn btn-primary">Back to Home</a>
    </div>
</main>
<div th:insert="fragments/footer :: body"></div>
</body>
</html>
