<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Create Job Posting</title>
</head>
<body>
<div th:insert="~{fragments/header :: header}"></div>
<main style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);">
        <h1>Create Job Posting</h1>
        <p style="color: #666; margin-bottom: 30px;">Post a new job opening to attract candidates</p>
        
        <form th:action="@{/recruiter/create}" method="post" th:object="${position}">
            <div class="form-group">
                <label for="title">Job Title</label>
                <input id="title" th:field="*{title}" placeholder="e.g., Senior Software Engineer" />
            </div>
            
            <div class="form-group">
                <label for="description">Job Description</label>
                <textarea id="description" th:field="*{description}" placeholder="Describe the role, responsibilities, and requirements" style="width: 100%; padding: 10px; border: 2px solid #e1e1e1; border-radius: 6px; font-family: inherit; font-size: 14px;"></textarea>
            </div>
            
            <div class="form-group">
                <label for="location">Location</label>
                <input id="location" th:field="*{location}" placeholder="e.g., San Francisco, CA" />
            </div>
            
            <div class="form-group">
                <label for="department">Department</label>
                <input id="department" th:field="*{department}" placeholder="e.g., Engineering" />
            </div>
            
            <div class="form-group">
                <label for="skills">Required Skills</label>
                <textarea id="skills" th:field="*{skills}" placeholder="List required skills (e.g., Java, Spring Boot, MongoDB)" style="width: 100%; padding: 10px; border: 2px solid #e1e1e1; border-radius: 6px; font-family: inherit; font-size: 14px;"></textarea>
            </div>
            
            <div class="form-group">
                <label for="salaryRange">Salary Range</label>
                <input id="salaryRange" th:field="*{salaryRange}" placeholder="e.g., $100,000 - $150,000" />
            </div>
            
            <div class="form-group">
                <label for="openings">Number of Openings</label>
                <input id="openings" th:field="*{openings}" type="number" placeholder="e.g., 2" />
            </div>
            <label>
    <input type="checkbox" th:field="*{published}" /> Publish Job
</label>

            
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Create Job Posting</button>
                <a href="javascript:history.back()" class="btn btn-outline" style="flex: 1; text-align: center; line-height: 2.5;">Cancel</a>
            </div>
        </form>
    </div>
</main>
<div th:insert="~{fragments/footer :: footer}"></div>

</body>
</html>
