<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Configuration - Admin</title>
    <style>
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; flex-direction: column; }
        .dashboard-container { display: flex; flex: 1; overflow: hidden; width: 100%; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); padding: 0; display: flex; flex-direction: column; min-height: 100%; flex-shrink: 0; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .sidebar-header h2 { margin: 0; font-size: 22px; font-weight: 700; color: white; }
        .sidebar nav { display: flex; flex-direction: column; gap: 8px; padding: 20px 15px; flex: 1; }
        .sidebar .nav-item { color: rgba(255,255,255,0.9); padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .sidebar .nav-item:hover { background-color: rgba(255,255,255,0.15); transform: translateX(4px); }
        .sidebar-footer { padding: 15px; border-top: 1px solid rgba(255,255,255,0.2); }
        .logout-btn { color: rgba(255,255,255,0.9); padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 12px; background: rgba(255,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); width: 100%; text-decoration: none; }
        main { flex: 1; padding: 40px; overflow-y: auto; background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%); }
        main h1 { color: #111827; margin-bottom: 35px; font-size: 32px; font-weight: 700; }
        .config-form { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.07); max-width: 600px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; color: #111827; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-submit:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div th:insert="~{fragments/sidebar_admin :: body}"></div>
    <main>
        <h1>🛠 System Configuration</h1>
        <form class="config-form">
            <div class="form-group">
                <label>Notification Email Template</label>
                <textarea placeholder="Enter email notification template...">Welcome to our recruiting system</textarea>
            </div>
            <div class="form-group">
                <label>Resume File Size Limit (MB)</label>
                <input type="number" value="5" placeholder="File size in MB" />
            </div>
            <div class="form-group">
                <label>Allowed File Types</label>
                <input type="text" value="pdf,doc,docx" placeholder="Comma-separated file extensions" />
            </div>
            <div class="form-group">
                <label>API Keys Configuration</label>
                <textarea placeholder="Enter API keys and configurations...">API_KEY=xxxxxxxxxxxxxx</textarea>
            </div>
            <div class="form-group">
                <label>Email Configuration</label>
                <input type="email" placeholder="SMTP Email Address" />
            </div>
            <div class="form-group">
                <label>SMTP Server</label>
                <input type="text" placeholder="smtp.example.com" />
            </div>
            <button type="submit" class="btn-submit">Save Configuration</button>
        </form>
    </main>
</div>
</body>
</html>
