<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Schedule Orientation - Onboarding</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        h1 {
            color: #111827;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
        }

        .progress-text {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: #f8f9ff;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Step 4: Schedule Orientation</h1>
    <p class="progress-text">Schedule the orientation for the new hire</p>

    <form method="post" th:action="@{'/onboard/candidates/' + ${onboarding.applicationId} + '/orientation'}">
        <div class="form-row">
            <div class="form-group">
                <label for="orientationDate">Orientation Date *</label>
                <input type="date" id="orientationDate" name="orientationDate" 
                       th:value="${onboarding.orientationDate}" required />
            </div>
            <div class="form-group">
                <label for="orientationTime">Orientation Time *</label>
                <input type="time" id="orientationTime" name="orientationTime" 
                       th:value="${onboarding.orientationTime}" required />
            </div>
        </div>

        <div class="form-group">
            <label for="orientationMode">Mode of Orientation *</label>
            <select id="orientationMode" name="orientationMode" required>
                <option value="">-- Select Mode --</option>
                <option value="In-person" th:selected="${onboarding.orientationMode == 'In-person'}">In-person</option>
                <option value="Virtual" th:selected="${onboarding.orientationMode == 'Virtual'}">Virtual</option>
            </select>
        </div>

        <div class="form-group">
            <label for="meetingLink">Meeting Link (if Virtual)</label>
            <input type="url" id="meetingLink" name="meetingLink" 
                   th:value="${onboarding.meetingLink}" 
                   placeholder="https://example.com/meeting" />
        </div>

        <div class="form-group">
            <label for="orientationLocation">Location (if In-person)</label>
            <input type="text" id="orientationLocation" name="orientationLocation" 
                   th:value="${onboarding.orientationLocation}" />
        </div>

        <div class="form-group">
            <label for="assignedTrainer">Assigned Trainer</label>
            <input type="text" id="assignedTrainer" name="assignedTrainer" 
                   th:value="${onboarding.assignedTrainer}" />
        </div>

        <div class="form-actions">
            <a class="btn btn-outline" th:href="@{'/onboard/candidates/' + ${onboarding.applicationId}}">Back</a>
            <button type="submit" class="btn btn-primary">Save & Continue</button>
        </div>
    </form>
</div>

</body>
</html>
