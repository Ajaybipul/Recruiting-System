<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/onboarding-theme.css}" />
    <link rel="stylesheet" th:href="@{/css/professional-theme.css}" />
    <title>Onboarding Checklist Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        body.onboarding-theme {
            display: flex;
            flex-direction: column;
            background-color: #f5f5f5;
            background-image: linear-gradient(rgba(10,20,40,0.55), rgba(10,20,40,0.55)), url('/images/bg.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }
        
        .dashboard-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            min-height: 100%;
            overflow-y: auto;
            flex-shrink: 0;
            border-right: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .sidebar-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }
        
        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .sidebar a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 6px;
            display: block;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }
        
        .sidebar a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(4px);
            color: white;
        }
        
        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        .page-header {
            margin-bottom: 30px;
        }
        
        .page-header h1 {
            font-size: 28px;
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 0;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .card-header {
            padding: 20px;
            border-bottom: 1px solid #ecf0f1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .card-body {
            padding: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-item {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        
        .stat-item label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .stat-item .value {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #ecf0f1;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
        
        .task-list {
            display: grid;
            gap: 15px;
        }
        
        .task-card {
            background-color: #f8f9fa;
            border: 1px solid #ecf0f1;
            border-radius: 6px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: start;
        }
        
        .task-card:hover {
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        
        .task-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .task-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .task-meta {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 8px;
            line-height: 1.6;
        }
        
        .task-meta span {
            margin-right: 20px;
        }
        
        .task-meta strong {
            color: #34495e;
            font-weight: 600;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .status-progress {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        
        .status-completed {
            background-color: #d4edda;
            color: #155724;
        }
        
        .phase-section {
            margin-bottom: 30px;
        }
        
        .phase-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
            margin-bottom: 20px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background-color: #e8eef5;
            color: #667eea;
        }
        
        .btn-secondary:hover {
            background-color: #d8dff0;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
            margin-top: 30px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7f8c8d;
        }
    </style>
</head>
<body class="onboarding-theme">
    <div class="dashboard-container">
        <!-- Main Content -->
        <main>
            <div class="page-header">
                <h1 th:text="${checklist.candidateName}"></h1>
            </div>
            
            <!-- Overview Stats -->
            <div class="card">
                <div class="card-body">
                    <div class="stats-grid">
                        <div class="stat-item">
                            <label>Total Tasks</label>
                            <div class="value" th:text="${checklist.tasks.size()}">0</div>
                        </div>
                        <div class="stat-item">
                            <label>Completed</label>
                            <div class="value" th:text="${completedCount}">0</div>
                        </div>
                        <div class="stat-item">
                            <label>In Progress</label>
                            <div class="value" th:text="${inProgressCount}">0</div>
                        </div>
                        <div class="stat-item">
                            <label>Pending</label>
                            <div class="value" th:text="${pendingCount}">0</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Progress -->
            <div class="card">
                <div class="card-body">
                    <label style="display: block; margin-bottom: 10px; font-weight: 600; color: #2c3e50;">Overall Completion</label>
                    <div class="progress-bar">
                        <div class="progress-fill" th:style="'width: ' + ${checklist.completionPercentage} + '%'"></div>
                    </div>
                    <div style="text-align: right; margin-top: 8px; font-size: 14px; color: #7f8c8d;">
                        <span th:text="${checklist.completionPercentage}"></span>%
                    </div>
                </div>
            </div>
            
            <!-- Tasks by Phase -->
            <div th:if="${checklist.tasks != null and checklist.tasks.size() > 0}">
                <div th:each="phase : ${phases}">
                    <div th:each="task, taskStat : ${checklist.tasks}" th:if="${task.phase == phase}">
                        <div th:if="${taskStat.first}" class="phase-title" th:text="${phase}"></div>
                        <div class="task-card">
                            <div>
                                <div class="task-title" th:text="${task.taskName}"></div>
                                <div th:if="${task.description}" class="task-meta">
                                    <strong>Description:</strong> <span th:text="${task.description}"></span>
                                </div>
                                <div class="task-meta">
                                    <span><strong>Assigned to:</strong> <span th:text="${task.assignedTo}"></span></span>
                                    <span><strong>Status:</strong> 
                                        <span class="status-badge" 
                                              th:classappend="${'status-' + task.status.toLowerCase()}"
                                              th:text="${task.status}"></span>
                                    </span>
                                    <span th:if="${task.dueDate}"><strong>Due:</strong> <span th:text="${#dates.format(task.dueDate, 'MMM dd')}"></span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Empty State -->
            <div th:unless="${checklist.tasks != null and checklist.tasks.size() > 0}" class="card">
                <div class="card-body">
                    <div class="empty-state">
                        <p style="font-size: 16px; margin-bottom: 10px;">No tasks added yet</p>
                        <a href="/onboarding/edit-checklist" class="btn btn-primary">Add Tasks</a>
                    </div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="card">
                <div class="card-body">
                    <div class="action-buttons">
                        <a href="/onboarding/new-hires" class="btn btn-secondary">Back to New Hires</a>
                        <a th:href="@{/onboarding/edit-checklist/{id}(id=${checklist.id})}" class="btn btn-primary">Edit Checklist</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
